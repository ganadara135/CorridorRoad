# .codex/config.toml
# Project-scoped Codex settings for CorridorRoad (FreeCAD Workbench)

[project]
name = "CorridorRoad"
# Optional: add a short description to keep the agent aligned
description = "FreeCAD Workbench for road corridor pipeline. Python FeaturePython objects, TaskPanels, commands."

[agent]
# Keep changes reviewable.
# If your Codex supports approvals/sandbox toggles, these options help safety.
# (Exact keys can vary by Codex version; see Config Reference if needed.)
ask_for_approval = "on-request"
sandbox = "workspace-write"

[style]
# Encourage consistent diffs and minimal churn
prefer_small_patches = true
include_patch_summary = true

[commands]
# “Safe” commands Codex can run during iterations (optional).
# Adjust to your environment.
allowed = [
  "git status",
  "git diff",
]

[notes]
# A “house rules” block to keep naming and architecture consistent.
# (This is just stored text; Codex will read it when you point it to this file or keep it in repo.)
architecture = """
- VerticalAlignment = data/engine (PVI, curve solving, elevation_at_station), no FG display props.
- Finished Grade (FG) object (FGDisplay) owns FG display: ShowWire, CurvesOnly, ZOffset, SourceVA.
- ProfileBundle stores Stations/ElevEG/ElevFG/Delta; draws EG only.
- TaskPanels must not reference removed VA FG properties (ShowFGWire/FGCurvesOnly/FGWireZOffset).
context_files = ["README_Codex.md", "docs/ARCHITECTURE.md", "docs/CODEX_PROMPTS.md"]
