# .codex/config.toml
# Project-scoped Codex settings for CorridorRoad

[project]
name = "CorridorRoad"
description = "FreeCAD Workbench for road corridor design. Includes Sample Alignment and practical alignment editing with transition curves and criteria checks."

[agent]
ask_for_approval = "on-request"
sandbox = "workspace-write"

[style]
prefer_small_patches = true
include_patch_summary = true

[commands]
allowed = [
  "git status",
  "git diff",
  "rg --files",
  "rg -n",
]

[notes]
architecture = """
- Keep VerticalAlignment as data/engine only (PVI, curve solver, elevation_at_station).
- FG display belongs only to FGDisplay (ShowWire, CurvesOnly, ZOffset, SourceVA).
- ProfileBundle stores Stations/ElevEG/ElevFG/ElevDelta and displays EG only.
- HorizontalAlignment supports two use cases:
  1) Sample Alignment command for simple baseline data.
  2) Practical Edit Alignment flow with CurveRadii/TransitionLengths, criteria checks, and actionable warnings.
- Keep module/file names stable and avoid broad refactors.
- Do not use git grep / compileall as mandatory validation steps in this repository workflow.
"""
context_files = ["README_Codex.md", "docs/ARCHITECTURE.md", "docs/CODEX_PROMPTS.md"]
