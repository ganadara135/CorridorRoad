<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" version="1.1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a52"/>
      <stop offset="100%" stop-color="#2f5f7f"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3e3e3e"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="url(#bg)" stroke="#0f2536" stroke-width="2"/>

  <!-- Emphasized road shape (large S-curve) -->
  <path d="M12 60 C 6 48, 14 38, 28 30 C 42 22, 52 14, 50 4"
        fill="none" stroke="#222222" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M12 60 C 6 48, 14 38, 28 30 C 42 22, 52 14, 50 4"
        fill="none" stroke="url(#road)" stroke-width="23" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center lane marking -->
  <path d="M12 60 C 6 48, 14 38, 28 30 C 42 22, 52 14, 50 4"
        fill="none" stroke="#ffcf40" stroke-width="3.4" stroke-linecap="round" stroke-dasharray="5 6"/>
</svg>
